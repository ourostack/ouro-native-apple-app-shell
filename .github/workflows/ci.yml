name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  swift-test:
    name: Swift tests
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Select newest Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version
          xcodebuild -version
      - name: Resolve package
        run: swift package resolve
      - name: Run strict tests
        run: swift test -Xswiftc -warnings-as-errors -Xswiftc -strict-concurrency=complete
      - name: Run UI surface probe
        run: scripts/ui-surface-probe.sh

  coverage:
    name: Coverage
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Select newest Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version
          xcodebuild -version
      - name: Resolve package
        run: swift package resolve
      - name: Enforce 100% line+region coverage
        run: scripts/check-coverage.sh
