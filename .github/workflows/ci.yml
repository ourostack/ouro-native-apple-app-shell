name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  swift-test:
    name: Swift tests
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Select newest Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version
          xcodebuild -version
      - name: Resolve package
        run: swift package resolve
      - name: Run shell boundary scanner selftest
        run: scripts/check-shell-boundary.sh --selftest
      - name: Run shell doctor selftest
        run: scripts/shell-doctor.sh --selftest
      - name: Run strict tests
        run: swift test -Xswiftc -warnings-as-errors -Xswiftc -strict-concurrency=complete
      - name: Run UI surface probe
        run: scripts/ui-surface-probe.sh

  coverage:
    name: Coverage
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Select newest Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version
          xcodebuild -version
      - name: Resolve package
        run: swift package resolve
      - name: Enforce 100% line+region coverage
        run: scripts/check-coverage.sh

  downstream-consumers:
    name: Downstream / ${{ matrix.consumer }}
    runs-on: macos-14
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        consumer:
          - ouro-md
          - ouro-workbench
    steps:
      - uses: actions/checkout@v6
      - name: Select newest Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version
          xcodebuild -version
      - name: Run downstream consumer smoke
        env:
          OURO_DOWNSTREAM_WORK_ROOT: ${{ runner.temp }}/ouro-downstream-consumers
          OURO_DOWNSTREAM_CONSUMER_REF_MODE: pinned
        run: scripts/check-downstream-consumers.sh --consumer "${{ matrix.consumer }}"
