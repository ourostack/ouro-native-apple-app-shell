name: Downstream Live Main

on:
  schedule:
    - cron: '17 10 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  downstream-live-contract:
    name: Downstream live contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Export downstream consumer matrix
        id: matrix
        run: echo "matrix=$(scripts/check-downstream-consumers.sh --print-matrix)" >> "$GITHUB_OUTPUT"

  downstream-live-consumers:
    name: Downstream / live-main / ${{ matrix.consumer }}
    needs: downstream-live-contract
    runs-on: macos-14
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.downstream-live-contract.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - name: Select newest Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$latest" ] || latest="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version
          xcodebuild -version
      - name: Run live-main downstream consumer smoke
        env:
          OURO_DOWNSTREAM_WORK_ROOT: ${{ runner.temp }}/ouro-downstream-live-consumers
          OURO_DOWNSTREAM_CONSUMER_REF_MODE: live
        run: scripts/check-downstream-consumers.sh --consumer "${{ matrix.consumer }}"
